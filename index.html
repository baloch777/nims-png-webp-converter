<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Let's Convert!</title>
  
  <link rel="icon" type="image/png" href="favicon.png">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic-to@1.4.2/dist/iife/heic-to.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, #ece9e6, #ffffff);
      margin: 0;
      padding: 0;
      text-align: center;
      color: #333;
    }

    header {
      background-color: #0d47a1;
      color: white;
      padding: 1em 0;
      font-size: 2em;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .header-logo {
      height: 120px;
      width: auto;
    }

    #top-container {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 20px;
      width: 90%;
      max-width: 1000px;
      margin: 2em auto;
    }

    #drop-area {
      flex: 2;
      border: 3px dashed #0d47a1;
      border-radius: 15px;
      background: #ffffff;
      padding: 2em;
      transition: 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #drop-area.highlight {
      border-color: #1565c0;
      background-color: #e3f2fd;
    }

    #global-controls {
      flex: 1;
      border: 2px solid #ccc;
      border-radius: 15px;
      background: #ffffff;
      padding: 1.5em;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .control-group {
      display: flex;
      flex-direction: column;
    }

    .control-group label {
      font-size: 0.9em;
      font-weight: bold;
      margin-bottom: 8px;
      color: #0d47a1;
    }

    .control-group input[type="range"],
    .control-group select {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9em;
      cursor: pointer;
    }

    .button {
      background-color: #0d47a1;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 10px 20px;
      font-size: 1em;
      margin-top: 1em;
      cursor: pointer;
    }

    .button:hover {
      background-color: #1565c0;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 2em;
      max-width: 1200px;
      margin: 0 auto;
    }

    .preview-item {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 1.5em;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      word-break: break-all;
    }

    .preview-item img {
      max-width: 100%;
      height: auto;
      max-height: 200px;
      border-radius: 8px;
    }

    .dim-display {
      font-size: 0.85em;
      color: #555;
      margin-top: 15px;
    }

    .size-display {
      font-weight: bold;
      font-size: 0.9em;
      margin-top: 5px;
      margin-bottom: 10px;
    }

    .size-display.good {
      color: #2e7d32;
    }

    .size-display.bad {
      color: #d32f2f;
    }

    a.button.download {
      background-color: #1976d2;
      text-decoration: none;
      width: 100%;
      box-sizing: border-box;
      display: block;
      margin-top: auto;
    }

    a.button.download:hover {
      background-color: #1565c0;
    }

    .loading-text {
      color: #0d47a1;
      font-weight: bold;
      font-size: 1.1em;
      margin: auto;
      padding: 20px;
    }

    .error-text {
      color: #d32f2f;
      font-size: 0.9em;
      text-align: left;
      padding: 15px;
      background: #ffebee;
      border-radius: 8px;
      width: 100%;
      box-sizing: border-box;
    }

    @media (max-width: 768px) {
      #top-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="Logo" class="header-logo">
  <span>Let's Convert!</span>
</header>

<div id="top-container">
  <div id="drop-area">
    <p><strong>Drag & Drop</strong> PNG, JPG, WEBP, HEIC, or ZIP files here</p>
    <input type="file" id="fileElem" accept=".png,.jpg,.jpeg,.webp,.heic,.heif,.zip" multiple style="display:none">
    <button class="button" onclick="document.getElementById('fileElem').click()">Choose Files</button>
  </div>

  <div id="global-controls">
    <div class="control-group">
      <label>Output Format</label>
      <select id="global-format">
        <option value="image/webp" selected>WEBP</option>
        <option value="image/jpeg">JPG</option>
        <option value="image/png">PNG</option>
      </select>
    </div>
    <div class="control-group" style="margin-top: 15px;">
      <label>Quality: <span id="global-quality-val">90</span>%</label>
      <input type="range" id="global-quality" min="0.1" max="1.0" step="0.01" value="0.90">
    </div>
    <div class="control-group" style="margin-top: 15px;">
      <label>Scale: <span id="global-scale-val">100</span>%</label>
      <input type="range" id="global-scale" min="1" max="100" step="1" value="100">
    </div>
  </div>
</div>

<div id="gallery"></div>

<script>
  const dropArea = document.getElementById('drop-area');
  const gallery = document.getElementById('gallery');
  const globalFormat = document.getElementById('global-format');
  const globalQuality = document.getElementById('global-quality');
  const globalQualityVal = document.getElementById('global-quality-val');
  const globalScale = document.getElementById('global-scale');
  const globalScaleVal = document.getElementById('global-scale-val');

  let processedImages = [];

  ['dragenter', 'dragover'].forEach(eventName => {
    dropArea.addEventListener(eventName, () => dropArea.classList.add('highlight'), false);
  });

  ['dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, () => dropArea.classList.remove('highlight'), false);
  });

  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, e => {
      e.preventDefault();
      e.stopPropagation();
    }, false);
  });

  dropArea.addEventListener('drop', e => {
    const dt = e.dataTransfer;
    const files = [...dt.files];
    handleAllFiles(files);
  });

  document.getElementById('fileElem').addEventListener('change', e => {
    handleAllFiles([...e.target.files]);
  });

  async function handleAllFiles(files) {
    gallery.innerHTML = '';
    processedImages.forEach(item => {
      if (item.blobUrl) URL.revokeObjectURL(item.blobUrl);
    });
    processedImages = [];

    let rawFiles = [];

    for (const file of files) {
      if (file.name.endsWith('.zip')) {
        const zip = await JSZip.loadAsync(file);
        const entries = [];
        zip.forEach((relativePath, zipEntry) => {
          if (!zipEntry.dir && /\.(png|jpg|jpeg|webp|heic|heif)$/i.test(zipEntry.name)) {
            entries.push(zipEntry);
          }
        });

        for (const entry of entries) {
          const blob = await entry.async('blob');
          rawFiles.push(new File([blob], entry.name, { type: blob.type }));
        }
      } else if (/\.(png|jpg|jpeg|webp|heic|heif)$/i.test(file.name)) {
        rawFiles.push(file);
      }
    }

    const collator = new Intl.Collator(undefined, { numeric: true, sensitivity: 'base' });
    rawFiles.sort((a, b) => collator.compare(a.name, b.name));

    for (const file of rawFiles) {
      await processFile(file);
    }
  }

  function formatBytes(bytes, decimals = 2) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const dm = decimals < 0 ? 0 : decimals;
    const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
  }

  function processFile(file) {
    return new Promise(resolve => {
      const isHeic = /\.(heic|heif)$/i.test(file.name);

      if (isHeic) {
        const container = document.createElement('div');
        container.className = 'preview-item';
        
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'loading-text';
        loadingDiv.innerHTML = 'Processing HEIC...<br><span style="font-size:0.8em;font-weight:normal;color:#555;">Estimated time: <span class="countdown-timer" style="font-weight:bold;">10</span> seconds. Please wait.</span>';
        
        container.appendChild(loadingDiv);
        gallery.appendChild(container);

        const countdownSpan = loadingDiv.querySelector('.countdown-timer');
        let timeLeft = 10;
        
        const timerInterval = setInterval(() => {
          timeLeft--;
          if (timeLeft > 0) {
            countdownSpan.textContent = timeLeft;
          } else {
            countdownSpan.textContent = "almost done...";
            countdownSpan.nextSibling.textContent = ""; 
          }
        }, 1000);

        const cleanBlob = new Blob([file], { type: "image/heic" });

        setTimeout(() => {
          HeicTo({
            blob: cleanBlob,
            type: "image/jpeg",
            quality: 0.9
          }).then(convertedBlob => {
            clearInterval(timerInterval);
            container.innerHTML = '';
            const singleBlob = Array.isArray(convertedBlob) ? convertedBlob[0] : convertedBlob;
            const fileToProcess = new File([singleBlob], file.name.replace(/\.(heic|heif)$/i, ".jpg"), { type: "image/jpeg" });
            continueProcessing(fileToProcess, file.name, container);
          }).catch(error => {
            clearInterval(timerInterval);
            let errorMessage = error && error.message ? error.message : String(error);
            container.innerHTML = '<div class="error-text"><strong>System Error Details:</strong><br>' + errorMessage + '<br><br><strong>Why this happened:</strong> This image uses a proprietary Apple encoding (like iOS 18 HDR, a Live Photo sequence, or Spatial Video). Open-source web browsers currently do not have the legal rights or engine updates required to read this specific format locally.</div>';
            console.error("HEIC conversion error:", error);
            resolve();
          });
        }, 100);
      } else {
        const container = document.createElement('div');
        container.className = 'preview-item';
        gallery.appendChild(container);
        continueProcessing(file, file.name, container);
      }

      function continueProcessing(targetFile, originalName, containerElement) {
        const reader = new FileReader();
        reader.readAsDataURL(targetFile);
        reader.onloadend = () => {
          const img = new Image();
          img.src = reader.result;
          img.onload = () => {
            
            const canvas = document.createElement('canvas');

            const previewImg = new Image();
            containerElement.appendChild(previewImg);

            const dimDisplay = document.createElement('div');
            dimDisplay.className = 'dim-display';
            containerElement.appendChild(dimDisplay);

            const sizeDisplay = document.createElement('div');
            sizeDisplay.className = 'size-display';
            containerElement.appendChild(sizeDisplay);

            const downloadLink = document.createElement('a');
            downloadLink.className = 'button download';
            downloadLink.textContent = 'Download Image';
            containerElement.appendChild(downloadLink);

            const itemData = {
              file: targetFile,
              originalName: originalName,
              originalImg: img, 
              originalWidth: img.width,
              originalHeight: img.height,
              canvas: canvas,
              imgElement: previewImg,
              dimElement: dimDisplay,
              sizeElement: sizeDisplay,
              linkElement: downloadLink,
              blobUrl: null
            };

            processedImages.push(itemData);
            runConversion(itemData);
            resolve();
          };
        };
      }
    });
  }

  function runConversion(item) {
    const format = globalFormat.value;
    const quality = parseFloat(globalQuality.value);
    const scale = parseInt(globalScale.value) / 100;

    const newWidth = Math.max(1, Math.round(item.originalWidth * scale));
    const newHeight = Math.max(1, Math.round(item.originalHeight * scale));

    item.canvas.width = newWidth;
    item.canvas.height = newHeight;
    const ctx = item.canvas.getContext('2d');
    
    ctx.drawImage(item.originalImg, 0, 0, newWidth, newHeight);

    item.dimElement.textContent = `Dimensions: ${newWidth} x ${newHeight} px`;

    item.canvas.toBlob(blob => {
      if (item.blobUrl) {
        URL.revokeObjectURL(item.blobUrl);
      }
      item.blobUrl = URL.createObjectURL(blob);
      item.imgElement.src = item.blobUrl;

      const sizeInKb = blob.size / 1024;
      item.sizeElement.textContent = `Size: ${formatBytes(blob.size)}`;
      
      if (sizeInKb <= 200) {
        item.sizeElement.classList.add('good');
        item.sizeElement.classList.remove('bad');
      } else {
        item.sizeElement.classList.add('bad');
        item.sizeElement.classList.remove('good');
      }

      let ext = format.split('/')[1];
      if (ext === 'jpeg') ext = 'jpg';
      let finalName = item.originalName.replace(/\.[^/.]+$/, "") + '.' + ext;

      item.linkElement.href = item.blobUrl;
      item.linkElement.download = finalName;

    }, format, quality);
  }

  function updateAll() {
    const format = globalFormat.value;
    const quality = parseFloat(globalQuality.value);
    const scale = parseInt(globalScale.value);
    
    globalQualityVal.textContent = Math.round(quality * 100);
    globalScaleVal.textContent = scale;

    if (format === 'image/png') {
      globalQuality.disabled = true;
    } else {
      globalQuality.disabled = false;
    }

    processedImages.forEach(item => runConversion(item));
  }

  globalFormat.addEventListener('change', updateAll);
  globalQuality.addEventListener('input', updateAll);
  globalScale.addEventListener('input', updateAll);

</script>

</body>
</html>
